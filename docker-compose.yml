version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: plagle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-plagle_password}
      MYSQL_DATABASE: ${DB_NAME:-plagle_db}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - plagle_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PlagLe FastAPI Application
  api:
    build: .
    container_name: plagle_api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-plagle_password}
      DB_NAME: ${DB_NAME:-plagle_db}
      DEBUG: ${DEBUG:-False}
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - plagle_network

networks:
  plagle_network:
    driver: bridge

volumes:
  mysql_data:
